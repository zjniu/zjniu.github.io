- title: Research Experience
  type: time_table
  contents:
    - title: Undergraduate Researcher at the Arjun Raj Lab
      department: Department of Bioengineering and Genetics, University of Pennsylvania
      year: 2021 - 2024
      description:
        - <strong>Created Piscis</strong>, an automatic deep learning algorithm for spot detection in RNA fluorescence <em>in situ</em> hybridization (FISH) images. Significantly outperformed existing computational methods.
        - <strong>Mentored a high school researcher</strong> on deep learning and writing Python functions for data preprocessing.
        - <strong>Contributed to NimbusImage</strong>, a web platform for biological image analysis that empowers researchers to visualize their data interactively while leveraging state-of-the-art machine learning algorithms.
        - <strong>Deployed NimbusImage</strong> via Docker on Linux servers in both the Raj Lab and Shaffer Lab.
    - title: Undergraduate Researcher at the Sydney Shaffer Lab
      department: Department of Pathology and Bioengineering, University of Pennsylvania
      year: 2021
      description:
        - <strong>Investigated the molecular origins of Barrett's esophagus</strong> by analyzing single-cell RNA sequencing data of patient samples in R. Discovered a rare subpopulation of ciliated cells expressing fetal intestinal genes.
        - <strong>Created Cellori</strong>, a fast and robust algorithm for nuclei segmentation in fluorescence microscopy images.
        - <strong>Created DeepTile</strong>, a Python library that splits large images into smaller tiles, processes each tile, and stitches together the outputs, allowing functions to scale up to arbitrary input image sizes.

